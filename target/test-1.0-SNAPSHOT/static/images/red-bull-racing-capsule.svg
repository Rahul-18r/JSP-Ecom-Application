<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Red Bull Racing merch capsule</title>
  <desc id="desc">A stylized premium racing merchandise card for the Red Bull Racing fan capsule.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081218"/>
      <stop offset="45%" stop-color="#0e1f29"/>
      <stop offset="100%" stop-color="#04070b"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#ff7b5d"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f5cff"/>
      <stop offset="100%" stop-color="#4dd0ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#f7c66a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f7c66a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1100" fill="url(#bg)" rx="72"/>
  <circle cx="1120" cy="210" r="350" fill="url(#glow)"/>

  <path d="M-40 760 C 260 640, 500 610, 760 690 C 995 760, 1220 745, 1660 590 L 1660 1100 L -40 1100 Z" fill="url(#blue)" opacity="0.28"/>
  <path d="M-40 835 C 270 730, 520 700, 760 770 C 1000 840, 1250 820, 1660 690 L 1660 1100 L -40 1100 Z" fill="url(#red)" opacity="0.88"/>

  <g opacity="0.9">
    <rect x="108" y="112" width="1384" height="876" rx="58" fill="url(#panel)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  </g>

  <g transform="translate(160 190)">
    <text x="0" y="0" fill="#ffffff" font-size="34" font-family="Space Grotesk, Arial, sans-serif" letter-spacing="7" text-transform="uppercase">Formula One / Red Bull Racing</text>
    <text x="0" y="88" fill="#ffffff" font-size="110" font-family="DM Serif Display, Georgia, serif" font-weight="700">Race-week merch</text>
    <text x="0" y="144" fill="rgba(255,255,255,0.78)" font-size="34" font-family="Space Grotesk, Arial, sans-serif" letter-spacing="1.5">caps • tees • hoodies • accessories</text>

    <g transform="translate(0 216)">
      <rect x="0" y="0" width="650" height="410" rx="40" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
      <rect x="52" y="58" width="546" height="294" rx="28" fill="rgba(255,255,255,0.04)"/>
      <path d="M92 302 C 186 198, 270 150, 372 150 C 438 150, 504 168, 560 206" fill="none" stroke="url(#blue)" stroke-width="18" stroke-linecap="round" opacity="0.75"/>
      <path d="M92 334 C 184 266, 286 238, 392 244 C 458 248, 518 266, 570 296" fill="none" stroke="url(#red)" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
      <circle cx="176" cy="180" r="98" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
      <text x="146" y="205" fill="#ffffff" font-size="58" font-family="DM Serif Display, Georgia, serif" font-weight="700">RB</text>
      <text x="314" y="188" fill="#ffffff" font-size="46" font-family="DM Serif Display, Georgia, serif" font-weight="700">Red Bull</text>
      <text x="314" y="236" fill="rgba(255,255,255,0.70)" font-size="30" font-family="Space Grotesk, Arial, sans-serif" letter-spacing="4">Racing capsule</text>
      <text x="314" y="294" fill="rgba(255,255,255,0.72)" font-size="24" font-family="Space Grotesk, Arial, sans-serif">Premium fan gear styled for the grid.</text>
    </g>
  </g>

  <g transform="translate(980 170)">
    <rect x="0" y="0" width="486" height="710" rx="38" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    <text x="38" y="74" fill="#ffffff" font-size="28" font-family="Space Grotesk, Arial, sans-serif" letter-spacing="6">LAUNCH OFFER</text>
    <text x="38" y="146" fill="#ffffff" font-size="76" font-family="DM Serif Display, Georgia, serif" font-weight="700">Paddock set</text>
    <text x="38" y="200" fill="rgba(255,255,255,0.76)" font-size="28" font-family="Space Grotesk, Arial, sans-serif">A darker merch story with premium contrast, clean callouts, and race-week energy.</text>

    <rect x="38" y="274" width="410" height="120" rx="28" fill="rgba(255,255,255,0.07)"/>
    <text x="68" y="326" fill="#ffffff" font-size="28" font-family="Space Grotesk, Arial, sans-serif" letter-spacing="3">FAN CAPSULE</text>
    <text x="68" y="366" fill="rgba(255,255,255,0.72)" font-size="24" font-family="Space Grotesk, Arial, sans-serif">Race tee + cap + hoodie</text>

    <rect x="38" y="418" width="410" height="120" rx="28" fill="rgba(255,255,255,0.07)"/>
    <text x="68" y="470" fill="#ffffff" font-size="28" font-family="Space Grotesk, Arial, sans-serif" letter-spacing="3">HOT DROP</text>
    <text x="68" y="510" fill="rgba(255,255,255,0.72)" font-size="24" font-family="Space Grotesk, Arial, sans-serif">Limited release bundles</text>

    <rect x="38" y="564" width="410" height="110" rx="28" fill="url(#red)" opacity="0.9"/>
    <text x="68" y="612" fill="#ffffff" font-size="28" font-family="Space Grotesk, Arial, sans-serif" letter-spacing="3">SHOP THE GRID</text>
    <text x="68" y="648" fill="rgba(255,255,255,0.90)" font-size="22" font-family="Space Grotesk, Arial, sans-serif">Premium look. Fast merch flow.</text>
  </g>
</svg>